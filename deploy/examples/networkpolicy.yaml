  namespace: rook-ceph # namespace:cluster
spec:
  podSelector:
    matchLabels:
      app: rook-ceph-exporter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring # namespace:monitoring
      ports:
        - protocol: TCP
          port: 9926
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system # namespace:dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
