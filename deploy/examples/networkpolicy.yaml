apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rook-ceph-operator
  namespace: rook-ceph # namespace:operator
spec:
  podSelector:
    matchLabels:
      app: rook-ceph-operator
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system # namespace:dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # The Kubernetes API server cannot be matched by pod/namespace selectors,
    # so egress to port 443 is allowed to all destinations.
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rook-ceph # namespace:cluster
          podSelector:
            matchLabels:
              app: rook-ceph-mon
      ports:
        - protocol: TCP
          port: 3300
        - protocol: TCP
          port: 6789
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rook-ceph # namespace:cluster
          podSelector:
            matchLabels:
              app: rook-ceph-mgr
      ports:
        - protocol: TCP
          port: 6800
          endPort: 7300
        - protocol: TCP
          port: 9283
