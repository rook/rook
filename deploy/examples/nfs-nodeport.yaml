#################################################################################################################
# Example of a user-managed NodePort Service to expose an NFS server outside the cluster.
# If CephNFS.spec.server.port is set to a custom value, set port and targetPort to match.
#################################################################################################################

apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-nfs-my-nfs-nodeport
  namespace: rook-ceph # namespace:cluster
spec:
  type: NodePort
  externalTrafficPolicy: Local
  ports:
    - name: nfs
      # Must match CephNFS.spec.server.port (default 2049)
      port: 2049
      targetPort: 2049
      # Optional: pin the NodePort; omit to let Kubernetes allocate one
      # nodePort: 32049
  selector:
    app: rook-ceph-nfs

    # Use the name of the CephNFS here
    ceph_nfs: my-nfs

    # It is safest to send clients to a single NFS server instance. Instance "a" always exists.
    instance: a
