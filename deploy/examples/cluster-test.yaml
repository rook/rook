#################################################################################################################
# Define the settings for the rook-ceph cluster with common settings for a small test cluster.
# All nodes with available raw devices will be used for the Ceph cluster. One node is sufficient
# in this example.

# For example, to create the cluster:
#   kubectl create -f crds.yaml -f common.yaml -f operator.yaml
#   kubectl create -f cluster-test.yaml
#################################################################################################################
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: my-cluster
  namespace: rook-ceph # namespace:cluster
spec:
  dataDirHostPath: /var/lib/rook
  cephVersion:
    image: quay.ceph.io/ceph-ci/ceph:wip-pdonnell-68f47b56-debug-arm64
    allowUnsupported: true
  mon:
    count: 1
    allowMultiplePerNode: true
  # test environments can skip ok-to-stop checks during upgrades
  skipUpgradeChecks: true
  mgr:
    count: 1
    allowMultiplePerNode: true
    modules:
      - name: rook
        enabled: false
      - name: cephadm
        enabled: false
  dashboard:
    enabled: true
  crashCollector:
    disable: true
  storage:
    useAllNodes: true
    useAllDevices: true
    allowDeviceClassUpdate: true
    allowOsdCrushWeightUpdate: false
    #deviceFilter:
    #config:
    #  deviceClass: testclass
  monitoring:
    enabled: false
  healthCheck:
    daemonHealth:
      mon:
        interval: 45s
        timeout: 600s
  priorityClassNames:
    all: system-node-critical
    mgr: system-cluster-critical
  disruptionManagement:
    managePodBudgets: true
  cephConfig:
    global:
      osd_pool_default_size: "1"
      mon_warn_on_pool_no_redundancy: "false"
      bdev_flock_retry: "20"
      bluefs_buffered_io: "false"
      mon_data_avail_warn: "10"
      auth_service_ticket_ttl: "30" # default 60*60=1_hr
      auth_mon_ticket_ttl: "120" # default '72_hr' (259,200 ?)
    mds:
      debug_auth: "30"
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: rook-config-override
  namespace: rook-ceph # namespace:cluster
data:
  # auth_service_ticket_ttl doesn't seem to have effect when set via mon config kv store
  # will conf override have diff behavior?
  # or is it that auth_mon_ticket_ttl is the actual controlling config?
  # gonna try both to stop wasting my time
  config: |
    [global]
    auth_service_ticket_ttl = 30
    auth_mon_ticket_ttl = 120
---
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: builtin-mgr
  namespace: rook-ceph # namespace:cluster
spec:
  name: .mgr
  replicated:
    size: 1
    requireSafeReplicaSize: false
