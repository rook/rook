  upgrade-from-tentacle-stable-to-tentacle-devel:
    if: github.repository == 'rook/rook'
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: consider tmate debugging
        uses: ./.github/workflows/tmate_debug
        with:
          use-tmate: ${{ secrets.USE_TMATE }}

      - name: setup cluster resources
        uses: ./.github/workflows/integration-test-setup-cluster-resources
        with:
          kubernetes-version: "v1.35.5"

      - name: TestCephUpgradeSuite
        run: |
          DEVICE_FILTER=$(tests/scripts/github-action-helper.sh find_extra_block_dev)
