name: Daily nightly jobs
on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight
  workflow_dispatch: {}

defaults:
  run:
    # reference: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#using-a-specific-shell
    shell: bash --noprofile --norc -eo pipefail -x {0}

permissions:
  contents: read

env:
  # Required for go-ceph rgw/admin account APIs which are gated behind
  # the ceph_preview build tag. Can be removed when go-ceph promotes
  # the account API out of preview.
  GOFLAGS: "-tags=ceph_preview"

jobs:
  canary-arm64:
    if: github.repository == 'rook/rook'
    uses: ./.github/workflows/ceph-arm64-suite-test.yml
    with:
      ceph_images: '["quay.io/ceph/ceph:v21", "quay.ceph.io/ceph-ci/ceph:main-arm64", "quay.ceph.io/ceph-ci/ceph:squid-release-arm64", "quay.ceph.io/ceph-ci/ceph:tentacle-arm64", "quay.ceph.io/ceph-ci/ceph:umbrella-release-arm64"]'
    secrets: inherit

  ceph-suite-tests:
    if: github.repository == 'rook/rook'
    uses: ./.github/workflows/ceph-suite-integration-test.yml
    with:
      ceph_suite_versions: '["squid-devel", "tentacle-devel", "umbrella-devel", "main"]'
      object_suite_tests: '["TestWithoutTLS", "TestWithTLS"]'
    secrets: inherit

  canary-tests:
    if: github.repository == 'rook/rook'
    uses: ./.github/workflows/canary-integration-test.yml
    with:
      ceph_images: '["quay.io/ceph/ceph:v19", "quay.io/ceph/ceph:v20", "quay.ceph.io/ceph-ci/ceph:main", "quay.ceph.io/ceph-ci/ceph:squid", "quay.ceph.io/ceph-ci/ceph:tentacle", "quay.ceph.io/ceph-ci/ceph:umbrella"]'
    secrets: inherit

  check-markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check markdown links
        run: make lint.markdown-links
