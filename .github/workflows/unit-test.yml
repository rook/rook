name: Unit tests
on:
  push:
    tags:
      - v*
    branches:
      - master
      - release-*
  pull_request:
    branches:
      - master
      - release-*
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: false
        description: "Version of jq to install"
        default: "1.7"

defaults:
  run:
    # reference: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#using-a-specific-shell
    shell: bash --noprofile --norc -eo pipefail -x {0}

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unittests:
    runs-on: ubuntu-22.04
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-ci')"
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"

      - name: Setup jq
        uses: dcarbone/install-jq-action@4fcb5062d7ce9bc4382d1a352d19ba3ba2c317c1 # v4.0.1
        with:
          version: "${{ inputs.version }}"

      - name: run unit tests
        run: |
          ROOK_UNIT_JQ_PATH="$(which jq)"
          export ROOK_UNIT_JQ_PATH
          # AZURE_EXTENSION_DIR is set in GH action runners and affects Azure KMS unit tests; unset it
          unset AZURE_EXTENSION_DIR
          GOPATH=$(go env GOPATH) make -j"$(nproc)" test | tee output.txt

      - name: check mds liveness probe script ran successfully
        run: |
          if grep "skipping mds liveness probe script unit tests because jq binary location is not known" output.txt
          then
              echo "jq not found, fail the test"
              exit 1
          fi
