name: Check links

on:
  pull_request:
#  repository_dispatch:
#  workflow_dispatch:
#  schedule:
#    - cron: "00 18 * * *"

jobs:
  lychee:
    name: Lychee
    runs-on: ubuntu-latest
    # issues: write perms required for peter-evans/create-issue-from-file
    # permissions:

    steps:
      - uses: actions/checkout@v5

      - name: build the docs
        run: |
          python3 -m venv ./venv
          source ./venv/bin/activate
          make -C ./build/release deps.docs
          make docs-build
          make generate-docs-crds

      - name: run the lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >
            --verbose
            --no-progress
            --base-url https://rook.io/
            --method get
            --exclude https://blog.rook.io
            site

#      - name: Create Issue From File
