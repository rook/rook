name: Integration test CephUpgradeSuite
on:
  pull_request:
    branches:
      - master
      - release-*
    paths-ignore:
      - "Documentation/**"
      - "design/**"

defaults:
  run:
    # reference: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#using-a-specific-shell
    shell: bash --noprofile --norc -eo pipefail -x {0}

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Required for go-ceph rgw/admin account APIs which are gated behind
  # the ceph_preview build tag. Can be removed when go-ceph promotes
  # the account API out of preview.
  GOFLAGS: "-tags=ceph_preview"
  # Double the test framework's default wait budget (55 retries x 5s = 275s);
  # CI runners regularly need longer, e.g. for PVC binding while the CSI
  # pods are still starting during the initial cluster deploy.
  RETRY_MAX: "110"

jobs:
  TestCephUpgradeSuite:
    if: ${{ github.event_name == 'pull_request' && github.ref != 'refs/heads/master' && !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        kubernetes-version: ["v1.31.14", "v1.36.1"]
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: consider (pre-job) debugging
        uses: ./.github/workflows/tmate_debug
        with:
          use-tmate: ${{ secrets.USE_TMATE }}
          debug-ci: true # DO NOT MERGE

      # - name: TESTONLY SLEEP # DO NOT MERGE
      #   run: sleep 15m # DO NOT MERGE
      - name: disk space
        run: df -h

      - name: setup cluster resources
        uses: ./.github/workflows/integration-test-setup-cluster-resources
        with:
          kubernetes-version: ${{ matrix.kubernetes-version }}

      - name: disk space
        run: df -h

      - name: apt clean
        run: |
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -h

      - name: TestCephUpgradeSuite
        run: |
          tests/scripts/github-action-helper.sh collect_udev_logs_in_background
          DEVICE_FILTER=$(tests/scripts/github-action-helper.sh find_extra_block_dev)
          export DEVICE_FILTER
          go test -v -timeout 3600s -failfast -run CephUpgradeSuite/TestUpgradeRook github.com/rook/rook/tests/integration

      - name: collect common logs
        if: always()
        run: |
          export LOG_DIR="/home/runner/work/rook/rook/tests/integration/_output/tests/"
          export CLUSTER_NAMESPACE="upgrade"
          export OPERATOR_NAMESPACE="upgrade-system"
          tests/scripts/collect-logs.sh

      - name: Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: ceph-upgrade-suite-artifact-${{ matrix.kubernetes-version }}
          path: /home/runner/work/rook/rook/tests/integration/_output/tests/
      - name: consider (post-job) debugging
        uses: ./.github/workflows/upterm_debug
        with:
          debug-ci: ${{ contains(github.event.pull_request.labels.*.name, 'debug-ci') }}

  TestHelmUpgradeSuite:
    if: ${{ github.event_name == 'pull_request' && github.ref != 'refs/heads/master' && !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        kubernetes-version: ["v1.31.14", "v1.36.1"]
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.18.2

      - name: consider (pre-job) debugging
        uses: ./.github/workflows/tmate_debug
        with:
          use-tmate: ${{ secrets.USE_TMATE }}
          debug-ci: ${{ contains(github.event.pull_request.labels.*.name, 'debug-ci') }}

      - name: setup cluster resources
        uses: ./.github/workflows/integration-test-setup-cluster-resources
        with:
          kubernetes-version: ${{ matrix.kubernetes-version }}

      - name: TestHelmUpgradeSuite
        run: |
          tests/scripts/github-action-helper.sh create_helm_tag

          tests/scripts/github-action-helper.sh collect_udev_logs_in_background
          DEVICE_FILTER=$(tests/scripts/github-action-helper.sh find_extra_block_dev)
          export DEVICE_FILTER
          go test -v -timeout 2700s -failfast -run CephUpgradeSuite/TestUpgradeHelm github.com/rook/rook/tests/integration

      - name: collect common logs
        if: always()
        run: |
          export LOG_DIR="/home/runner/work/rook/rook/tests/integration/_output/tests/"
          export CLUSTER_NAMESPACE="upgrade"
          export OPERATOR_NAMESPACE="upgrade-system"
          tests/scripts/collect-logs.sh

      - name: Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: ceph-upgrade-helm-suite-artifact-${{ matrix.kubernetes-version }}
          path: /home/runner/work/rook/rook/tests/integration/_output/tests/

      - name: consider (post-job) debugging
        uses: ./.github/workflows/upterm_debug
        with:
          debug-ci: ${{ contains(github.event.pull_request.labels.*.name, 'debug-ci') }}
