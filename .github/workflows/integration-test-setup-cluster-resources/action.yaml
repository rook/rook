name: setup cluster resources
description: Setup cluster resources for canary/integration tests
inputs:
  kubernetes-version:
    description: kubernetes version to use for the workflow
    required: true

runs:
  using: "composite"
  steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: true # removes old golang version but saves ~6GB
        large-packages: false # takes a long time to run b/c package mgr
        android: false # takes a long time to run b/c package mgr
        dotnet: false # takes a long time to run b/c package mgr
        haskell: false # takes a long time to run b/c package mgr

    - name: setup golang
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: "1.26"

    - name: create kind cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      with:
        # Pin the kind version instead of relying on helm/kind-action's default, so the
        # cluster (and which kindest/node images are available) stays reproducible.
        version: v0.32.0
        # The kubernetes version is selected by the node image tag. kindest/node images are
        # published per kind release, so each kubernetes-version used by the matrices must have
        # a matching kindest/node:<version> image (the analogue of minikube's kubernetes-version).
        node_image: kindest/node:${{ inputs.kubernetes-version }}
        # The config bind-mounts the host /dev and /var/lib/rook into the single node so the
        # existing host-based disk-prep helpers keep working under kind. See the config file.
        config: .github/workflows/integration-test-setup-cluster-resources/kind-config.yaml
        cluster_name: kind
        wait: 300s
        # The runner is ephemeral, so a failed post-job `kind delete` is harmless. Some jobs
        # (nvmeof, multus) leave the node container holding devices via the /dev bind-mount, so
        # `docker rm` of the node can fail at teardown; don't let that fail an otherwise-green job.
        ignore_failed_clean: "true"

    - name: prepare the kind node
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh prepare_kind_node

    - name: route host to cluster services
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh add_host_routes_to_cluster

    - name: install deps
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh install_deps

    - name: print k8s cluster status
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh print_k8s_cluster_status

    # This step is required for all the integration tests except the canary tests
    - name: use local disk
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh use_local_disk_for_integration_test

    - name: build rook
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh build_rook
