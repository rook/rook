name: setup cluster resources
description: Setup cluster resources for canary/integration tests
inputs:
  kubernetes-version:
    description: kubernetes version to use for the workflow
    required: true

runs:
  using: "composite"
  steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: true # removes old golang version but saves ~6GB
        large-packages: false # takes a long time to run b/c package mgr
        android: false # takes a long time to run b/c package mgr
        dotnet: false # takes a long time to run b/c package mgr
        haskell: false # takes a long time to run b/c package mgr

    - name: setup golang
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: "1.26"

    - name: Install cri-dockerd
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: |
       ARCH="$(dpkg --print-architecture)"   # amd64 / arm64
        case "${ARCH}" in
         amd64|arm64)
           ;;
         *)
           echo "Unsupported arch: $ARCH"
           exit 1
           ;;
        esac

        TAG=v0.4.3
        DEB_VERSION=0.4.3.3
        PKG="cri-dockerd_${DEB_VERSION}-0.ubuntu-focal_${ARCH}.deb"
        TMPDIR="$(mktemp -d)"
        TMP_DEB="${TMPDIR}/${PKG}"
        URL="https://github.com/Mirantis/cri-dockerd/releases/download/${TAG}/${PKG}"
        # --fail so an HTTP error page is not saved as the .deb (dpkg then fails on the
        # corrupt archive), and retry transient download errors
        curl -fLO --retry 5 --retry-all-errors --retry-delay 10 -o "${TMP_DEB}" "${URL}"
        # fail early with explicit diagnostics
        ls -l "${TMPDIR}"
        test -s "${TMP_DEB}" || { echo "Downloaded file missing/empty: ${TMP_DEB}"; exit 1; }
        file "${TMP_DEB}" || true
        dpkg-deb --info "${TMP_DEB}" >/dev/null
        ls -lh "${TMP_DEB}"
        sudo dpkg -i "${TMP_DEB}"
        rm -f "${TMP_DEB}"

    - name: Setup Minikube
      uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
      with:
        # lock minikube version to ensure release branch CI doesn't fail when latest minikube no
        # longer supports older k8s version we lock to
        minikube-version: "1.38.0"
        kubernetes-version: ${{ inputs.kubernetes-version }}
        driver: none
        container-runtime: docker
        memory: 6g
        cpus: 2
        addons: ingress
        cni: calico
        # --force: when the requested kubernetes version is missing from minikube's compiled-in
        # version list (any version released after the pinned minikube), 'minikube start'
        # verifies the version with an anonymous GitHub API request, which is regularly
        # rate-limited on shared runner IPs and fails the job (K8S_FAIL_CONNECT, exit code 40).
        # The versions used here are pinned constants already validated by the PRs that bump
        # them, so that check adds nothing in CI; an invalid version would still fail fast at
        # the kubeadm/kubelet download.
        # --wait-timeout: minikube's default 6m node-ready wait expires on slow runners
        # (GUEST_START, exit code 80).
        start-args: --force --wait-timeout=15m

    - name: install deps
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh install_deps

    - name: print k8s cluster status
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh print_k8s_cluster_status

    # This step is required for all the integration tests except the canary tests
    - name: use local disk
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh use_local_disk_for_integration_test

    - name: build rook
      shell: bash --noprofile --norc -eo pipefail -x {0}
      run: tests/scripts/github-action-helper.sh build_rook
