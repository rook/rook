name: Linters
on:
  push:
    tags:
      - v*
    branches:
      - master
      - release-*
  pull_request:
    branches:
      - master
      - release-*
    paths:
      - '**.py'
      - '**.yaml'
      - '**.yml'
      - 'Documentation/**/*.md'
      - '.github/workflows/linters.yaml'
      - 'mlc_config.json'

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Lint YAML files
        run: make lint.yaml

  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12

      - name: Install pylint and requirements
        run: |
          pip install pylint
          pip install pylint --upgrade
          pip install requests
          pip install pygit2

      - name: Lint Python scripts
        run: make lint.python

      - name: Setup black for py
        uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # stable

  check-markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch full git history - for detecting modified files
      - name: Check markdown links
        run: |
          npm install -g markdown-link-check
          set -e
          EXIT_CODE=0
          FAILED_FILES=()
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            if ! markdown-link-check "$file" --config mlc_config.json -v; then
              EXIT_CODE=1
              FAILED_FILES+=("$file")
            fi
          done < <(find Documentation -name '*.md' -print0)
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "================================"
            echo "❌ BROKEN LINKS DETECTED"
            echo "================================"
            echo "The following files contain broken links:"
            for file in "${FAILED_FILES[@]}"; do
              echo "  - $file"
            done
            echo "================================"
          fi
          
          exit $EXIT_CODE
