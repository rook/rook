args:
  - |
    echo "Starting the csi-logrotate-sidecar"
    mkdir -p {{ .CsiLogDirPath }}/{{ .OperatorNamespace }}/cephcsi/logrotate-config/{{ .CSILogFolder }};
    echo '{{ .CsiLogDirPath }}/{{ .OperatorNamespace }}/cephcsi/log/{{ .CSILogFolder }}/*.log {
        {{ .CSILogRotationPeriod }}
        missingok
        rotate 7
        compress
        copytruncate
        notifempty
    }' >  {{ .CsiLogDirPath }}/{{ .OperatorNamespace }}/cephcsi/logrotate-config/{{ .CSILogFolder }}/csi;
    echo "File creation container completed";

    LOG_ROTATE_CEPH_CSI_FILE={{ .CsiLogDirPath }}/{{ .OperatorNamespace }}/cephcsi/logrotate-config/{{ .CSILogFolder }}/csi
    LOG_MAX_SIZE={{ .CSILogRotationMaxSize }}
    if [ "$LOG_MAX_SIZE" != "0" ]; then
      sed --in-place "4i \ \ \ \ maxsize $LOG_MAX_SIZE" "$LOG_ROTATE_CEPH_CSI_FILE"
    fi

    while true; do
      logrotate --verbose "$LOG_ROTATE_CEPH_CSI_FILE"
      sleep 15m
    done
command:
  - /bin/sh
  - -c
image: {{ .CSIPluginImage }}
imagePullPolicy: IfNotPresent
name: log-collector
volumeMounts:
  - mountPath: {{ .CsiLogDirPath }}/{{ .OperatorNamespace }}/cephcsi/logrotate-config/{{ .CSILogFolder }}
    name: csi-logs-logrotate
  - mountPath: {{ .CsiLogDirPath }}/{{ .OperatorNamespace }}/cephcsi/log/{{ .CSILogFolder }}
    name: csi-log
