apiVersion: apps/v1
kind: Deployment
metadata:
  name: rook-ceph-floating-mon-{{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    ceph.rook.io/do-not-reconcile: ""
    app: rook-ceph-floating-mon
    app.kubernetes.io/component: cephclusters.ceph.rook.io
    app.kubernetes.io/created-by: rook-ceph-operator
    app.kubernetes.io/instance: {{ .Name }}
    app.kubernetes.io/managed-by: rook-ceph-operator
    app.kubernetes.io/name: ceph-mon
    app.kubernetes.io/part-of: rook-ceph
    ceph-version: {{ .CephVersion }}
    ceph_daemon_id: {{ .Name }}
    ceph_daemon_type: mon
    mon: {{ .Name }}
    mon_cluster: {{ .Namespace }}
    mon_daemon: "true"
    rook-version: {{ .RookVersion }}
    rook.io/operator-namespace: {{ .OperatorNamespace }}
    rook_cluster: {{ .Namespace }}
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: rook-ceph-floating-mon
      ceph_daemon_id: {{ .Name }}
      mon: {{ .Name }}
      mon_cluster: {{ .Namespace }}
      rook_cluster: {{ .Namespace }}
  strategy:
    type: Recreate
  template:
    metadata:
      name: rook-ceph-floating-mon-{{ .Name }}
      namespace: {{ .Namespace }}
      labels:
        app: rook-ceph-floating-mon
        app.kubernetes.io/component: cephclusters.ceph.rook.io
        app.kubernetes.io/created-by: rook-ceph-operator
        app.kubernetes.io/instance: {{ .Name }}
        app.kubernetes.io/managed-by: rook-ceph-operator
        app.kubernetes.io/name: ceph-mon
        app.kubernetes.io/part-of: rook-ceph
        ceph_daemon_id: {{ .Name }}
        ceph_daemon_type: mon
        mon: {{ .Name }}
        mon_cluster: {{ .Namespace }}
        mon_daemon: "true"
        rook.io/operator-namespace: {{ .OperatorNamespace }}
        rook_cluster: {{ .Namespace }}
    spec:
      affinity: {}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: rook-ceph-default
      serviceAccountName: rook-ceph-default
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 30
      {{ if .NodeName }}
      nodeSelector:
        kubernetes.io/hostname: {{ .NodeName }}
      {{ end }}
      {{ if .PriorityClassName }}
      priorityClassName: {{ .PriorityClassName }}
      {{ end }}
      volumes:
        - name: rook-config-override
          projected:
            defaultMode: 420
            sources:
              - configMap:
                  items:
                    - key: config
                      mode: 292
                      path: ceph.conf
                  name: rook-config-override
        - name: rook-ceph-mons-keyring
          secret:
            defaultMode: 420
            secretName: rook-ceph-mons-keyring
        - name: ceph-daemons-sock-dir
          hostPath:
            path: {{ .HostSocketDir }}
            type: DirectoryOrCreate
        - name: rook-ceph-log
          hostPath:
            path: {{ .HostLogDir }}
            type: ""
        - name: rook-ceph-crash
          hostPath:
            path: {{ .HostCrashDir }}
            type: ""
        - name: ceph-daemon-data
          hostPath:
            path: {{ .HostDataDir }}
            type: ""
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: drbd-conf
          hostPath:
            path: {{ .DRBDConfPath }}
            type: File
        - name: drbd-dir
          hostPath:
            path: {{ .DRBDDirPath }}
            type: Directory
        - name: host-root
          hostPath:
            path: /
      initContainers:
        - name: drbd-init
          image: {{ .DRBDImage }}
          imagePullPolicy: {{ .ImagePullPolicy }}
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              umount {{ .ContainerDataDir }} || true
              REAL_HOSTNAME=$(cat /host/etc/hostname)
              echo "Setting hostname to: $REAL_HOSTNAME"
              echo "$REAL_HOSTNAME" > /proc/sys/kernel/hostname
              echo "Hostname after change:"
              uname -n
              echo "Promoting DRBD resource to Primary..."
              drbdadm primary mon --config-file {{ .DRBDConfPath }} || true
              echo "DRBD init steps completed"
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: drbd-conf
              mountPath: {{ .DRBDConfPath }}
            - name: drbd-dir
              mountPath: {{ .DRBDDirPath }}
            - name: host-root
              mountPath: /host
              readOnly: true
        - name: chown-container-data-dir
          image: {{ .CephImage }}
          imagePullPolicy: {{ .ImagePullPolicy }}
          securityContext:
            capabilities:
              drop:
                - NET_RAW
            privileged: true
          command:
            - sh
            - -c
            - |
              echo "Mounting device..."
              mkdir -p {{ .ContainerDataDir }}
              mount {{ .DRBDDevice }} {{ .ContainerDataDir }}
              trap 'echo "[CLEANUP] Unmounting DRBD..."; umount {{ .ContainerDataDir }} || true' TERM INT EXIT

              echo "Running chown..."
              exec chown \
                --verbose \
                --recursive \
                ceph:ceph \
                /var/log/ceph \
                /var/lib/ceph/crash \
                /run/ceph \
                {{ .ContainerDataDir }}
          volumeMounts:
            - mountPath: /etc/ceph
              name: rook-config-override
              readOnly: true
            - mountPath: /run/ceph
              name: ceph-daemons-sock-dir
            - mountPath: /etc/ceph/keyring-store/
              name: rook-ceph-mons-keyring
              readOnly: true
            - mountPath: /var/log/ceph
              name: rook-ceph-log
            - mountPath: /var/lib/ceph/crash
              name: rook-ceph-crash
            - mountPath: {{ .ContainerDataDir }}
              name: ceph-daemon-data
            - name: dev
              mountPath: /dev
            - name: drbd-conf
              mountPath: {{ .DRBDConfPath }}
            - name: drbd-dir
              mountPath: {{ .DRBDDirPath }}
        - name: init-mon-fs
          image: {{ .CephImage }}
          imagePullPolicy: {{ .ImagePullPolicy }}
          securityContext:
            capabilities:
              drop:
                - NET_RAW
            privileged: true
          command:
            - sh
            - -c
            - |
              echo "Mounting device..."
              mkdir -p {{ .ContainerDataDir }}
              mount {{ .DRBDDevice }} {{ .ContainerDataDir }}
              trap 'echo "[CLEANUP] Unmounting DRBD..."; umount {{ .ContainerDataDir }} || true' TERM INT EXIT

              echo "Starting ceph-mon mkfs..."
              exec ceph-mon \
                --fsid={{ .FSID }} \
                --keyring=/etc/ceph/keyring-store/keyring \
                --default-log-to-stderr=true \
                --default-err-to-stderr=true \
                --default-mon-cluster-log-to-stderr=true \
                "--default-log-stderr-prefix=debug " \
                --default-log-to-file=false \
                --default-mon-cluster-log-to-file=false \
                --mon-host=$(ROOK_CEPH_MON_HOST) \
                --mon-initial-members=$(ROOK_CEPH_MON_INITIAL_MEMBERS) \
                --id={{ .Name }} \
                --setuser=ceph \
                --setgroup=ceph \
                --public-addr={{ .PublicIP }} \
                --mkfs
          env:
            - name: CONTAINER_IMAGE
              value: {{ .CephImage }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: POD_MEMORY_LIMIT
              valueFrom:
                resourceFieldRef:
                  divisor: "0"
                  resource: limits.memory
            - name: POD_MEMORY_REQUEST
              valueFrom:
                resourceFieldRef:
                  divisor: "0"
                  resource: requests.memory
            - name: POD_CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  divisor: "1"
                  resource: limits.cpu
            - name: POD_CPU_REQUEST
              valueFrom:
                resourceFieldRef:
                  divisor: "0"
                  resource: requests.cpu
            - name: CEPH_USE_RANDOM_NONCE
              value: "true"
            - name: ROOK_MSGR2
              value: {{ .ROOK_MSGR2 }}
            - name: ROOK_CEPH_MON_HOST
              valueFrom:
                secretKeyRef:
                  key: mon_host
                  name: rook-ceph-config
            - name: ROOK_CEPH_MON_INITIAL_MEMBERS
              valueFrom:
                secretKeyRef:
                  key: mon_initial_members
                  name: rook-ceph-config
          volumeMounts:
            - mountPath: /etc/ceph
              name: rook-config-override
              readOnly: true
            - mountPath: /run/ceph
              name: ceph-daemons-sock-dir
            - mountPath: /etc/ceph/keyring-store/
              name: rook-ceph-mons-keyring
              readOnly: true
            - mountPath: /var/log/ceph
              name: rook-ceph-log
            - mountPath: /var/lib/ceph/crash
              name: rook-ceph-crash
            - mountPath: {{ .ContainerDataDir }}
              name: ceph-daemon-data
            - name: dev
              mountPath: /dev
            - name: drbd-conf
              mountPath: {{ .DRBDConfPath }}
            - name: drbd-dir
              mountPath: {{ .DRBDDirPath }}
      containers:
        - name: mon
          image: {{ .CephImage }}
          imagePullPolicy: {{ .ImagePullPolicy }}
          workingDir: /var/log/ceph
          securityContext:
            capabilities:
              drop:
                - NET_RAW
            privileged: true
          command:
            - sh
            - -c
            - |
              echo "Mounting device..."
              mkdir -p {{ .ContainerDataDir }}
              mount {{ .DRBDDevice }} {{ .ContainerDataDir }}

              echo "Starting ceph-mon..."
              exec ceph-mon \
                --fsid={{ .FSID }} \
                --keyring=/etc/ceph/keyring-store/keyring \
                --default-log-to-stderr=true \
                --default-err-to-stderr=true \
                --default-mon-cluster-log-to-stderr=true \
                "--default-log-stderr-prefix=debug " \
                --default-log-to-file=false \
                --default-mon-cluster-log-to-file=false \
                --mon-host=$(ROOK_CEPH_MON_HOST) \
                --mon-initial-members=$(ROOK_CEPH_MON_INITIAL_MEMBERS) \
                --id={{ .Name }} \
                --setuser=ceph \
                --setgroup=ceph \
                --foreground \
                --public-addr={{ .PublicIP }} \
                --mon-data={{ .ContainerDataDir }} \
                --public-bind-addr=$(ROOK_POD_IP)
          ports:
            - name: tcp-msgr2
              containerPort: 3300
              protocol: TCP
            - name: tcp-msgr1
              containerPort: 6789
              protocol: TCP
          env:
            - name: CONTAINER_IMAGE
              value: {{ .CephImage }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: POD_MEMORY_LIMIT
              valueFrom:
                resourceFieldRef:
                  divisor: "0"
                  resource: limits.memory
            - name: POD_MEMORY_REQUEST
              valueFrom:
                resourceFieldRef:
                  divisor: "0"
                  resource: requests.memory
            - name: POD_CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  divisor: "1"
                  resource: limits.cpu
            - name: POD_CPU_REQUEST
              valueFrom:
                resourceFieldRef:
                  divisor: "0"
                  resource: requests.cpu
            - name: CEPH_USE_RANDOM_NONCE
              value: "true"
            - name: ROOK_MSGR2
              value: {{ .ROOK_MSGR2 }}
            - name: ROOK_CEPH_MON_HOST
              valueFrom:
                secretKeyRef:
                  key: mon_host
                  name: rook-ceph-config
            - name: ROOK_CEPH_MON_INITIAL_MEMBERS
              valueFrom:
                secretKeyRef:
                  key: mon_initial_members
                  name: rook-ceph-config
            - name: ROOK_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          livenessProbe:
            exec:
              command:
                - env
                - -i
                - sh
                - -c
                - |
                  outp="$(ceph --admin-daemon /run/ceph/ceph-mon.{{ .Name }}.asok mon_status 2>&1)"
                  rc=$?
                  if [ $rc -ne 0 ]; then
                    echo "ceph daemon health check failed with the following output:"
                    echo "$outp" | sed -e 's/^/> /g'
                    exit $rc
                  fi
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          startupProbe:
            exec:
              command:
                - env
                - -i
                - sh
                - -c
                - |
                  outp="$(ceph --admin-daemon /run/ceph/ceph-mon.{{ .Name }}.asok mon_status 2>&1)"
                  rc=$?
                  if [ $rc -ne 0 ]; then
                    echo "ceph daemon health check failed with the following output:"
                    echo "$outp" | sed -e 's/^/> /g'
                    exit $rc
                  fi
            failureThreshold: 6
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /etc/ceph
              name: rook-config-override
              readOnly: true
            - mountPath: /run/ceph
              name: ceph-daemons-sock-dir
            - mountPath: /etc/ceph/keyring-store/
              name: rook-ceph-mons-keyring
              readOnly: true
            - mountPath: /var/log/ceph
              name: rook-ceph-log
            - mountPath: /var/lib/ceph/crash
              name: rook-ceph-crash
            - mountPath: {{ .ContainerDataDir }}
              name: ceph-daemon-data
            - name: dev
              mountPath: /dev
            - name: drbd-conf
              mountPath: {{ .DRBDConfPath }}
            - name: drbd-dir
              mountPath: {{ .DRBDDirPath }}
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Running preStop: unmount + demote"
                    sleep 5
                    umount {{ .ContainerDataDir }} || true
                    echo "Pod cleanup done"
        - name: log-collector
          image: {{ .CephImage }}
          imagePullPolicy: {{ .ImagePullPolicy }}
          tty: true
          securityContext:
            capabilities:
              drop:
                - NET_RAW
            privileged: true
          command:
            - /bin/bash
            - -x
            - -e
            - -m
            - -c
            - |
              CEPH_CLIENT_ID=ceph-mon.{{ .Name }}
              PERIODICITY=daily
              LOG_ROTATE_CEPH_FILE=/etc/logrotate.d/ceph
              LOG_MAX_SIZE=500M
              ROTATE=7
              ADDITIONAL_LOG_FILES=

              sed -i "s|*.log|$CEPH_CLIENT_ID.log $ADDITIONAL_LOG_FILES|" "$LOG_ROTATE_CEPH_FILE"
              sed --in-place "s/daily/$PERIODICITY/g" "$LOG_ROTATE_CEPH_FILE"
              sed --in-place "s/rotate 7/rotate $ROTATE/g" "$LOG_ROTATE_CEPH_FILE"

              if [ "$LOG_MAX_SIZE" != "0" ]; then
                sed --in-place "4i \ \ \ \ maxsize $LOG_MAX_SIZE" "$LOG_ROTATE_CEPH_FILE"
              fi

              while true; do
                logrotate --verbose "$LOG_ROTATE_CEPH_FILE"
                sleep 15m
              done
          volumeMounts:
            - mountPath: /etc/ceph
              name: rook-config-override
              readOnly: true
            - mountPath: /run/ceph
              name: ceph-daemons-sock-dir
            - mountPath: /var/log/ceph
              name: rook-ceph-log
            - mountPath: /var/lib/ceph/crash
              name: rook-ceph-crash
        - name: shut-down-app
          image: {{ .DRBDImage }}
          imagePullPolicy: {{ .ImagePullPolicy }}
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              REAL_HOSTNAME=$(cat /host/etc/hostname)
              echo "Setting hostname to: $REAL_HOSTNAME"
              echo "$REAL_HOSTNAME" > /proc/sys/kernel/hostname
              echo "Hostname after change:"
              uname -n
              sleep infinity
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: drbd-conf
              mountPath: {{ .DRBDConfPath }}
            - name: drbd-dir
              mountPath: {{ .DRBDDirPath }}
            - name: host-root
              mountPath: /host
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Running preStop: unmount + demote"
                    sleep 5
                    for i in $(seq 1 10); do
                      if umount {{ .ContainerDataDir }} 2>/dev/null; then
                        echo "Unmounted by sidecar"
                      fi
                      if drbdadm secondary mon --config-file {{ .DRBDConfPath }}; then
                        echo "Successfully demoted"
                        break
                      fi
                      echo "Retry in 1s..."
                      sleep 1
                    done
