# Kind cluster configuration for Rook's canary and integration test CI.
#
# Kind runs the node as a container, so host resources are not visible to it by default. The
# extraMounts below bind-mount the resources the host-based disk-prep helpers (use_local_disk*,
# create_partitions_for_osds, blockDevicePV.sh, localPathPV.sh, ...) depend on:
#   - /dev          : block devices, partitions and LVM devices created on the host
#                     appear inside the node (shared devtmpfs) and, in turn, inside the OSD
#                     pods, which hostPath-mount the node's /dev.
#   - /var/lib/rook : dataDirHostPath and the local-PV mon directories created on the host.
#   - /run/udev     : ceph-volume reads the udev database (/run/udev/data) to inventory a
#                     disk; the kind node runs no udevd, so without the host's populated db
#                     ceph-volume fails with "No udev data could be retrieved" and rook skips
#                     the device. The runner host runs udevd, so bind-mount its db.
# HostToContainer propagation ensures devices created on the host after the cluster is up
# (e.g. partitions and extra iSCSI disks set up by per-job steps) also appear inside the node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /dev
        containerPath: /dev
        propagation: HostToContainer
      - hostPath: /var/lib/rook
        containerPath: /var/lib/rook
        propagation: HostToContainer
      - hostPath: /run/udev
        containerPath: /run/udev
        propagation: HostToContainer
